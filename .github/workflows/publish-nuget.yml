name: Publish NuGet Package

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BeatmapParser.sln

      - name: Build release binaries
        run: |
          IFS=';' read -ra TFMS <<< "$(dotnet msbuild BeatmapParser/BeatmapParser.csproj -nologo -getProperty:TargetFrameworks)"
          for tfm in "${TFMS[@]}"; do
            dotnet build BeatmapParser/BeatmapParser.csproj \
              --configuration Release \
              --framework "$tfm" \
              --no-restore \
              -p:GeneratePackageOnBuild=false
          done

      - name: Pack NuGet package
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          dotnet pack BeatmapParser/BeatmapParser.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --output ./artifacts \
            -p:GeneratePackageOnBuild=false \
            -p:PackageVersion="$VERSION"

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
